services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://127.0.0.1:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092


  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "5100:5100"
    environment:
      - PORT=5100
      - KAFKA_BROKER=kafka:29092
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=${DATABASE_URL}
    depends_on:
      - kafka
      - redis

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - GATEWAY_PORT=5000
      - AUTH_SERVICE_URL=http://auth-service:5100
      - PRODUCT_SERVICE_URL=http://product-service:5200
      - CART_SERVICE_URL=http://cart-service:5300
      - ADDRESS_SERVICE_URL=http://address-service:5400
    depends_on:
      - auth-service
      - product-service
      - cart-service
      - address-service


  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    ports:
      - "5200:5200"
    environment:
      - PORT=5200
      - KAFKA_BROKER=kafka:29092
      - MONGO_URI=${DATABASE_URL}
    depends_on:
      - kafka


  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    ports:
      - "5300:5300"
    environment:
      - PORT=5300
      - KAFKA_BROKER=kafka:29092
      - MONGO_URI=${DATABASE_URL}
    depends_on:
      - kafka


  address-service:
    build:
      context: ./address-service
      dockerfile: Dockerfile
    ports:
      - "5400:5400"
    environment:
      - PORT=5400
      - KAFKA_BROKER=kafka:29092
      - MONGO_URI=${DATABASE_URL}
    depends_on:
      - kafka